name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/microcredit_deploy_key
          chmod 600 ~/.ssh/microcredit_deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        shell: bash
        run: |
          set -euo pipefail
          ssh \
            -i ~/.ssh/microcredit_deploy_key \
            -p "${{ secrets.VPS_PORT }}" \
            -o IdentitiesOnly=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'set -euo pipefail
             cd /opt/microcredit
             git pull
             docker compose down
             docker compose up -d --build
             docker image prune -f
             for attempt in $(seq 1 30); do
               if curl -fsS -o /dev/null -w "%{http_code}" http://127.0.0.1:8081 | grep -q "^200$"; then
                 echo "Healthcheck passed"
                 exit 0
               fi

               echo "Healthcheck attempt ${attempt}/30 failed; waiting for nginx..."
               sleep 2
             done

             echo "Healthcheck failed after 30 attempts"
             docker ps
             docker compose logs --tail=100
             exit 1'
